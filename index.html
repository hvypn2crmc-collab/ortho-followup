<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="йӘЁз§‘йҡҸи®ҝ">
<meta name="theme-color" content="#0F3460">
<title>йӘЁз§‘жүӢи¶іжҳҫеҫ®еӨ–з§‘ В· йҡҸи®ҝзі»з»ҹ</title>
<style>
:root{
  --bg:#EEF2F7;--surface:#fff;--card:#F4F7FB;
  --primary:#0F3460;--pm:#1A5276;--pl:#2471A3;--pll:#D6EAF8;
  --accent:#1ABC9C;--warn:#E67E22;--danger:#C0392B;
  --muted:#7F8C8D;--border:#CADCEC;--text:#1A252F;--texts:#4A5568;
  --r:12px;--sh:0 2px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* в”Җв”Җ Header в”Җв”Җ */
.hdr{background:linear-gradient(135deg,#0F3460,#0a2240);color:#fff;padding:env(safe-area-inset-top,0) 14px 8px;min-height:56px;display:flex;align-items:flex-end;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(0,0,0,0.28)}
.ht{font-size:15px;font-weight:900;letter-spacing:.3px}
.hs{font-size:10px;opacity:.6;margin-top:1px}
.hbr{display:flex;gap:5px}
.hbtn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:#fff;padding:5px 9px;border-radius:7px;font-size:11px;cursor:pointer;font-weight:700;font-family:inherit}
.hbtn:active{opacity:.7}

/* в”Җв”Җ Category Sidebar + Content в”Җв”Җ */
.layout{display:flex;min-height:calc(100vh - 56px - env(safe-area-inset-top,0px))}

/* в”Җв”Җ Sidebar (desktop) в”Җв”Җ */
.sidebar{width:72px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;flex-shrink:0}
.cat-btn{width:58px;padding:10px 4px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .18s;position:relative}
.cat-btn .ico{font-size:22px;line-height:1}
.cat-btn .lbl{font-size:9px;color:var(--muted);font-weight:600;text-align:center;line-height:1.2}
.cat-btn .cnt{position:absolute;top:4px;right:4px;background:var(--danger);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.cat-btn.active{background:var(--pll)}
.cat-btn.active .lbl{color:var(--primary);font-weight:800}
.cat-btn:active{opacity:.7}
.side-div{width:40px;height:1px;background:var(--border);margin:4px 0}

/* в”Җв”Җ Main content в”Җв”Җ */
.content{flex:1;padding:14px;overflow-x:hidden;min-width:0}

/* в”Җв”Җ Category Header Banner в”Җв”Җ */
.cat-banner{border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.cat-banner .cb-ico{font-size:36px;flex-shrink:0}
.cat-banner .cb-title{font-size:17px;font-weight:900;color:#fff}
.cat-banner .cb-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px}
.cat-banner .cb-count{position:absolute;right:16px;top:50%;transform:translateY(-50%);text-align:right}
.cat-banner .cb-num{font-size:28px;font-weight:900;color:rgba(255,255,255,0.9);line-height:1}
.cat-banner .cb-nl{font-size:10px;color:rgba(255,255,255,0.65)}

/* в”Җв”Җ Search в”Җв”Җ */
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}

/* в”Җв”Җ Patient Cards в”Җв”Җ */
.pcard{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.pcard-head{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;cursor:pointer;user-select:none;transition:background .15s}
.pcard-head:hover{background:var(--card)}
.pcard-head.expanded{border-bottom:1px solid var(--border)}
.pname{font-size:15px;font-weight:900}
.pmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;background:var(--pll);color:var(--pl);margin-right:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pcard-body{padding:12px 14px;background:var(--card)}
.pcard-actions{display:flex;gap:6px;flex-wrap:wrap}

/* в”Җв”Җ Visit Timeline (inside patient card) в”Җв”Җ */
.visit-tl{margin-top:12px}
.vt-item{display:flex;gap:0;margin-bottom:0}
.vt-line-col{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0}
.vt-dot{width:10px;height:10px;border-radius:50%;border:2px solid;flex-shrink:0;margin-top:4px}
.vt-bar{flex:1;width:2px;background:var(--border);min-height:8px}
.vt-content{flex:1;padding:0 0 12px 10px;min-width:0}
.vt-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;cursor:pointer}
.vt-date{font-size:12px;font-weight:700;color:var(--pm)}
.vt-detail{margin-top:8px;padding:10px;background:var(--surface);border-radius:8px;border:1px solid var(--border)}

/* в”Җв”Җ Photo Grid в”Җв”Җ */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:6px;margin-top:6px}
.pt{position:relative;border-radius:7px;overflow:hidden;aspect-ratio:1;background:#dde5f0;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.pt:hover{border-color:var(--pl)}
.pt img{width:100%;height:100%;object-fit:cover}
.pt .ptl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:#fff;font-size:9px;padding:2px 4px;text-align:center}
.pt .ptd{position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.add-ph{border:2px dashed var(--border);border-radius:7px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:10px;background:var(--card)}
.add-ph:hover{border-color:var(--pl);color:var(--pl)}

/* в”Җв”Җ Stat strip в”Җв”Җ */
.stat-strip{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sbox{background:var(--surface);border-radius:10px;padding:12px;border:1px solid var(--border);flex:1;min-width:80px;box-shadow:var(--sh)}
.snum{font-size:24px;font-weight:900;line-height:1}
.slbl{font-size:10px;color:var(--muted);margin-top:2px}

/* в”Җв”Җ Form в”Җв”Җ */
.lbl{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
input,select,textarea{width:100%;padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:var(--card);color:var(--text);font-family:inherit;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--pl)}
textarea{resize:vertical;min-height:60px}
input[readonly]{background:#e4eaf0;color:var(--muted)}

/* в”Җв”Җ Buttons в”Җв”Җ */
.btn{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:opacity .15s}
.btn:active{opacity:.72}
.bp{background:var(--primary);color:#fff}
.ba{background:var(--accent);color:#fff}
.bg{background:#E4EAF0;color:var(--texts)}
.bsm{padding:5px 10px;font-size:11px}

/* в”Җв”Җ Grid в”Җв”Җ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:480px){.g3{grid-template-columns:1fr 1fr}}

/* в”Җв”Җ Modal в”Җв”Җ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.52);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:580px){.ov{align-items:center}}
.mbox{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,0.22)}
@media(min-width:580px){.mbox{border-radius:14px}}
.mh{background:linear-gradient(135deg,var(--primary),#0a2240);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;border-radius:18px 18px 0 0}
@media(min-width:580px){.mh{border-radius:14px 14px 0 0}}
.mc{padding:14px 16px}
.mcl{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1;padding:0;margin-left:8px;flex-shrink:0}
.score-btns{display:flex;gap:5px;flex-wrap:wrap}
.sbtn{padding:5px 10px;border-radius:7px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.div{border-top:1px solid var(--border);margin:10px 0}
.fe{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}

/* в”Җв”Җ Photo Viewer в”Җв”Җ */
.pv-ov{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:300;display:flex;flex-direction:column}
.pv-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;color:#fff;flex-wrap:wrap;gap:6px}
.pv-ttl{font-weight:700;font-size:13px}
.pv-main{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
#pvc{display:block;max-width:100%;max-height:65vh;cursor:crosshair;touch-action:none}
.pv-tools{display:flex;gap:6px;padding:8px 14px;background:rgba(0,0,0,0.5);flex-wrap:wrap;justify-content:center}
.ptool{padding:6px 12px;border-radius:7px;border:2px solid rgba(255,255,255,0.22);background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:all .15s}
.ptool.active{border-color:#1ABC9C;background:#1ABC9C}
.cdot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);cursor:pointer;transition:transform .15s}
.cdot.active{border-color:#fff;transform:scale(1.3)}

/* в”Җв”Җ Bottom mobile cat nav в”Җв”Җ */
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:90;
  padding:4px 0 0;
  padding-bottom:max(4px, env(safe-area-inset-bottom, 4px));
  box-shadow:0 -2px 12px rgba(0,0,0,0.08);}
@media(max-width:640px){
  .sidebar{display:none}
  .bot-nav{display:flex}
  .layout{flex-direction:column}
  .content{padding:10px}
  html,body{height:100%;overflow-x:hidden}
  body{-webkit-overflow-scrolling:touch}
}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 2px;border:none;background:none;cursor:pointer;font-family:inherit;position:relative;min-height:52px}
.bn-btn .ico{font-size:22px;line-height:1}
.bn-btn .lbl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;line-height:1.2}
.bn-btn.active .ico{transform:scale(1.1)}
.bn-btn.active .lbl{color:var(--primary);font-weight:800}
.bn-btn .cnt{position:absolute;top:2px;right:calc(50% - 16px);background:var(--danger);color:#fff;font-size:8px;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 2px;font-weight:800}
@media(max-width:640px){
  .content{padding-bottom:calc(72px + env(safe-area-inset-bottom, 0px))}
}

/* в”Җв”Җ Header safe area already handled above в”Җв”Җ */

/* PWA */
#inst{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--primary);color:#fff;padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom,10px));z-index:500;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between}
@media(max-width:640px){#inst{bottom:calc(52px + env(safe-area-inset-bottom,0px))}}

.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mt6{margin-top:6px}.mt8{margin-top:8px}
.empty{text-align:center;color:var(--muted);padding:32px 16px;font-size:13px}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div>
    <div class="ht">рҹҰҙ йӘЁз§‘жүӢи¶іжҳҫеҫ®еӨ–з§‘йҡҸи®ҝ</div>
    <div class="hs">еҲҶзұ»з®ЎзҗҶ В· з…§зүҮж ҮжіЁ В· ж—¶й—ҙиҪҙйҡҸи®ҝ</div>
  </div>
  <div class="hbr">
    <button class="hbtn" onclick="exportCSV()">рҹ“Ҡ CSV</button>

</div>

<div class="layout">

<!-- Modal -->

<!-- Photo Viewer -->

    <button class="ptool" id="tl-text" onclick="setTool('text')">вңҸ ж–Үеӯ—</button>
    <button class="ptool" onclick="undoLast()">вҶ© ж’Өй”Җ</button>
    <button class="ptool" onclick="clearAnn()">рҹ—‘ жё…йҷӨ</button>
    <div class="cdot active" style="background:#FF3B30" data-c="#FF3B30" onclick="setColor(this)"></div>
    <div class="cdot" style="background:#FFD60A" data-c="#FFD60A" onclick="setColor(this)"></div>
    <div class="cdot" style="background:#30D158" data-c="#30D158" onclick="setColor(this)"></div>
    <div class="cdot" style="background:#fff" data-c="#fff" onclick="setColor(this)"></div>
  </div>
</div>

<div id="inst">
  <div><div style="font-weight:700;font-size:13px">рҹ“І е®үиЈ…еҲ°дё»еұҸе№•</div><div style="font-size:10px;opacity:.75">еғҸAppдёҖж ·дҪҝз”ЁпјҢзҰ»зәҝеҸҜз”Ё</div></div>
  <div style="display:flex;gap:6px">
    <button onclick="doPWA()" style="background:#fff;color:var(--primary);border:none;padding:5px 12px;border-radius:7px;font-weight:700;cursor:pointer;font-size:12px">е®үиЈ…</button>
    <button onclick="document.getElementById('inst').style.display='none'" style="background:rgba(255,255,255,0.18);border:none;color:#fff;padding:5px 9px;border-radius:7px;cursor:pointer;font-size:12px">зЁҚеҗҺ</button>
  </div>
</div>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CATEGORIES
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const CATS = [
  {id:'amputation', ico:'рҹ–җ', name:'ж–ӯжҢҮ/ж–ӯиӮў\nеҶҚжӨҚ', color:'#C0392B', bg:'linear-gradient(135deg,#C0392B,#922B21)',
   fields:[
     {id:'vas',lbl:'иЎҖз®ЎеҚұиұЎиҜ„дј°',ph:'еҰӮпјҡж— иЎҖз®ЎеҚұиұЎпјҢзҡ®жё©жӯЈеёё'},
     {id:'color',lbl:'жҢҮ/иӮўз«ҜйўңиүІ',ph:'еҰӮпјҡзәўж¶Ұ/иӢҚзҷҪ/зҙ«з»Җ'},
     {id:'temp',lbl:'зҡ®жё©(в„ғ)',ph:'еҰӮпјҡ33.5'},
     {id:'cap',lbl:'жҜӣз»ҶиЎҖз®Ўе……зӣҲ',ph:'еҰӮпјҡ<2sпјҢжӯЈеёё'},

     {id:'rom',lbl:'е…іиҠӮжҙ»еҠЁеәҰ(В°)',ph:'еҰӮпјҡеұҲжӣІ80В°пјҢдјёзӣҙ-10В°'},
   ]},
  {id:'flap', ico:'рҹ©№', name:'зҡ®з“Ј\nз§»жӨҚ', color:'#7D3C98', bg:'linear-gradient(135deg,#7D3C98,#5B2C6F)',
   fields:[
     {id:'fc',lbl:'зҡ®з“ЈйўңиүІ',ph:'еҰӮпјҡзәўж¶Ұ/иӢҚзҷҪ'},
     {id:'ft',lbl:'зҡ®з“Јеј еҠӣ',ph:'еҰӮпјҡеј еҠӣйҖӮдёӯ'},
     {id:'ftemp',lbl:'зҡ®жё©(в„ғ)',ph:''},
     {id:'donor',lbl:'дҫӣеҢәж„ҲеҗҲ',ph:'еҰӮпјҡеҜ№еҗҲиүҜеҘҪпјҢж— жё—ж¶І'},
     {id:'sens2',lbl:'ж„ҹи§үжғ…еҶө',ph:''},
     {id:'nec',lbl:'еқҸжӯ»иҜ„дј°',ph:'еҰӮпјҡж— еқҸжӯ»/иҫ№зјҳеқҸжӯ»зәҰ1cm'},
   ]},
  {id:'tendon', ico:'рҹ’Ә', name:'иӮҢи…ұ\nжҚҹдјӨ', color:'#1A5276', bg:'linear-gradient(135deg,#1A5276,#0F3460)',
   fields:[
     {id:'glide',lbl:'иӮҢи…ұж»‘еҠЁ',ph:'еҰӮпјҡдё»еҠЁеұҲдјёжөҒз•…'},
     {id:'grip',lbl:'жҸЎеҠӣ(kg)',ph:''},

function renderPCard(p, c){
  const days=daysSince(p.surgeryDate);
  const last=p.visits[p.visits.length-1];
  const isExp=expandedPats[p.id];
  const totalPh=p.visits.reduce((a,v)=>a+(v.photos||[]).length,0);

  let visitsHtml='';
  if(isExp){
    if(!p.visits.length){
      visitsHtml=`<div style="color:var(--muted);font-size:12px;padding:6px 0">жҡӮж— йҡҸи®ҝи®°еҪ•пјҢзӮ№еҮ»"пјӢйҡҸи®ҝ"ејҖе§Ӣи®°еҪ•</div>`;
    } else {
      visitsHtml=`<div class="visit-tl">`;
      [...p.visits].reverse().forEach((v,ri)=>{
        const vi=p.visits.length-1-ri;
        const isLast=ri===p.visits.length-1;
        const isVExp=expandedVisits[v.id];
        const sc=si(v.healingScore);
        visitsHtml+=`
        <div class="vt-item">
          <div class="vt-line-col">
            <div class="vt-dot" style="background:${sc.c};border-color:${sc.c}"></div>
            ${!isLast?`<div class="vt-bar"></div>`:''}
          </div>
          <div class="vt-content">
            <div class="vt-head" onclick="toggleVisit('${v.id}')">
              <div>
                <span class="vt-date">рҹ“… ${v.date} ${v.time}</span>
                <span style="font-size:10px;color:var(--muted);margin-left:6px">рҹ“·${(v.photos||[]).length}еј </span>
              </div>
              <div style="display:flex;align-items:center;gap:5px">
                ${badge(v.healingScore)}
                <span style="color:var(--muted);font-size:14px">${isVExp?'в–І':'в–ј'}</span>
              </div>
            </div>
            ${isVExp?renderVisitDetail(v, p.id, c, vi):''}
          </div>
        </div>`;
      });
      visitsHtml+=`</div>`;
    }
  }

  return `<div class="pcard" id="pc-${p.id}">
    <div class="pcard-head${isExp?' expanded':''}" onclick="togglePat('${p.id}')">
      <div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="pname">${p.name}</span>
          <span class="tag">${p.id}</span>
          <span class="tag">${p.gender}/${p.age}еІҒ</span>
        </div>
        <div class="pmeta">
          <span style="font-size:11px;color:var(--muted)">жңҜеҗҺ <b style="color:${c.color}">${days}</b> еӨ© В· ${p.surgeryDate}</span>
          <span style="font-size:11px;color:var(--muted)">йҡҸи®ҝ${p.visits.length}ж¬Ў В· рҹ“·${totalPh}еј </span>
          ${last?badge(last.healingScore):'<span style="font-size:10px;color:var(--muted)">еҫ…йҡҸи®ҝ</span>'}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <button class="btn bsm" style="background:#EBF5FB;color:var(--pm);font-size:11px" onclick="event.stopPropagation();exportPatientReport('${p.id}','${c.id}','zh')">рҹ“„ дёӯж–Ү</button>
        <button class="btn bsm" style="background:#EBF5FB;color:var(--pm);font-size:11px" onclick="event.stopPropagation();exportPatientReport('${p.id}','${c.id}','en')">рҹ“„ EN</button>

        <span style="color:var(--muted);font-size:16px">${isExp?'в–І':'в–ј'}</span>
      </div>
    </div>
    ${isExp?`<div class="pcard-body">
      <div class="g3 mb8" style="font-size:12px">
        <div><label class="lbl">з—…еҢә</label>${p.ward||'вҖ”'}</div>
        <div><label class="lbl">иҒ”зі»з”өиҜқ</label>${p.phone||'вҖ”'}</div>

function renderVisitDetail(v, pid, c, vi){

  return `<div class="vt-detail">
    <div class="g2 mb8">

const PHOTO_LABELS=['иғҢдҫ§и§Ӯ','жҺҢдҫ§и§Ӯ','дҫ§йқўи§Ӯ','ж•ҙдҪ“и§Ӯ','з»ҶиҠӮеӣҫ','дҫӣеҢә'];
function addWatermark(src,date,time,name,lbl){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onerror=()=>rej(new Error('Image load failed'));
    img.onload=()=>{
      try{
        // в”Җв”Җ 1080p: й•ҝиҫ№жңҖеӨ§1920pxпјҢзҹӯиҫ№жңҖеӨ§1080pxпјҢдҝқжҢҒеҺҹжҜ”дҫӢ в”Җв”Җ
        // жүӢжңәеҺҹеӣҫйҖҡеёё4000x3000пјҢеҺӢзј©еҗҺзәҰ1920x1440пјҢжё…жҷ°еәҰи¶іеӨҹеӯҰжңҜдҪҝз”Ё
        const LONG=1920, SHORT=1080;
        let w=img.width, h=img.height;
        const isLandscape = w >= h;
        const longMax  = isLandscape ? LONG : SHORT;
        const shortMax = isLandscape ? SHORT : LONG;
        if(w > longMax || h > shortMax){
          const scaleByLong  = longMax  / (isLandscape ? w : h);
          const scaleByShort = shortMax / (isLandscape ? h : w);
          const scale = Math.min(scaleByLong, scaleByShort);
          w = Math.round(w * scale);
          h = Math.round(h * scale);
        }
        const c=document.createElement('canvas');
        c.width=w; c.height=h;
        const ctx=c.getContext('2d');
        // й«ҳиҙЁйҮҸзј©ж”ҫ
        ctx.imageSmoothingEnabled=true;
        ctx.imageSmoothingQuality='high';
        ctx.drawImage(img,0,0,w,h);
        // в”Җв”Җ ж°ҙеҚ°жқЎ в”Җв”Җ
        const bh=Math.max(30,h*0.05);
        ctx.fillStyle='rgba(15,52,96,0.78)';
        ctx.fillRect(0,h-bh,w,bh);
        const fs=Math.max(13,Math.min(bh*0.52,20));
        ctx.font=`bold ${fs}px PingFang SC,Arial`;
        ctx.fillStyle='#fff';
        ctx.fillText(`${name}  ${date} ${time}  ${lbl}`,10,h-bh*0.18);
        // в”Җв”Җ иҙЁйҮҸ0.88пјҡ1080pдёӢзәҰ300-600KBпјҢе…јйЎҫжё…жҷ°еәҰе’ҢеӯҳеӮЁ в”Җв”Җ
        res(c.toDataURL('image/jpeg',0.88));
      }catch(e){ rej(e); }
    };
    img.src=src;
  });
}

let photosProcessing=false;
function handlePhotos(e){
  const files=Array.from(e.target.files);
  if(!files.length) return;
  photosProcessing=true;
  const g=document.getElementById('new-ph-grid');
  if(g){
    const ld=document.createElement('div');
    ld.id='ph-loading';
    ld.style.cssText='grid-column:1/-1;text-align:center;color:var(--muted);font-size:12px;padding:10px';
    ld.textContent=`рҹ“· еӨ„зҗҶдёӯ (0/${files.length})вҖҰ`;
    g.appendChild(ld);
  }
  const p=(data[curCatId]||[]).find(x=>x.id===curPid);
  let done=0;
  const promises=files.map((f,i)=>new Promise(res=>{
    const r=new FileReader();
    r.onerror=()=>res(null);
    r.onload=async ev=>{
      try{
        const lbl=PHOTO_LABELS[(curPhotos.length+i)%PHOTO_LABELS.length];
        const stamped=await addWatermark(ev.target.result,nowDate(),nowTime(),p.name,lbl);
        done++;
        const ld2=document.getElementById('ph-loading');
        if(ld2) ld2.textContent=`рҹ“· еӨ„зҗҶдёӯ (${done}/${files.length})вҖҰ`;
        res({id:uid(),src:stamped,annotated:null,lbl,ts:nowDate()+' '+nowTime()});
      }catch(err){
        console.error('Photo process error:',err);
        res(null);
      }
    };
    r.readAsDataURL(f);
  }));
  Promise.all(promises).then(results=>{
    const nph=results.filter(x=>x!==null);
    curPhotos=[...curPhotos,...nph];
    photosProcessing=false;
    refreshNewGrid();
    if(nph.length===files.length){
      showToast(`рҹ“· ${nph.length}еј з…§зүҮе·Іе°ұз»ӘпјҢеҸҜд»Ҙдҝқеӯҳ`);
    } else {
      showToast(`вҡ пёҸ ${nph.length}/${files.length}еј еӨ„зҗҶжҲҗеҠҹ`);
    }
  }).catch(err=>{
    photosProcessing=false;
    refreshNewGrid();
    showToast('вқҢ з…§зүҮеӨ„зҗҶеӨұиҙҘпјҢиҜ·йҮҚиҜ•');
  });
  e.target.value='';
}

function refreshNewGrid(){
  const g=document.getElementById('new-ph-grid');if(!g)return;
  let h=curPhotos.map((ph,i)=>`
    <div class="pt">
      <img src="${ph.annotated||ph.src}"/>
      <div class="ptl">${ph.lbl}</div>
      <button class="ptd" onclick="rmPh(${i})">Г—</button>
    </div>`).join('');
  h+=`<div class="add-ph" onclick="document.getElementById('fup').click()">
    <div style="font-size:20px">рҹ“·</div><div style="margin-top:2px">з»§з»ӯдёҠдј </div>
  </div>`;
  g.innerHTML=h;
}
function rmPh(i){ curPhotos.splice(i,1); refreshNewGrid(); }

function saveVisit(){
  if(photosProcessing){ showToast('вҸі з…§зүҮд»ҚеңЁеӨ„зҗҶпјҢиҜ·зЁҚеҖҷ'); return; }
  try {
    const p=(data[curCatId]||[]).find(x=>x.id===curPid);
    const c=cat(curCatId);
    const sf={};
    c.fields.forEach(f=>{ const el=document.getElementById('sf-'+f.id); if(el) sf[f.id]=el.value; });
    const v={
      id:'V'+uid(),date:nowDate(),time:nowTime(),
      wl:parseFloat(document.getElementById('vl').value)||0,
      ww:parseFloat(document.getElementById('vw').value)||0,
      hs:curVScore,
      med:document.getElementById('vmed')?document.getElementById('vmed').value:'',
      dress:document.getElementById('vdress')?document.getElementById('vdress').value:'',
      sym:document.getElementById('vsym')?document.getElementById('vsym').value:'',
      func:document.getElementById('vfunc')?document.getElementById('vfunc').value:'',
      notes:document.getElementById('vnotes')?document.getElementById('vnotes').value:'',
      sf, photos:curPhotos,
    };
    p.visits.push(v);
    expandedPats[curPid]=true;
    expandedVisits[v.id]=false;
    // Save data - if localStorage is full due to photos, save without photos
    try {
      saveData();
    } catch(storageErr) {
      // If storage full, save visit without photo data
      v.photos = v.photos.map(ph=>({...ph, src:'', annotated:'', storageFull:true}));
      saveData();
      showToast('вҡ пёҸ з…§зүҮиҝҮеӨ§жңӘиғҪе…ЁйғЁдҝқеӯҳпјҢж–Үеӯ—е·Ідҝқеӯҳ');
    }
    closeModal();
    renderNav();
    renderContent();
    showToast('вң… йҡҸи®ҝи®°еҪ•е·Ідҝқеӯҳ');
  } catch(err) {
    showToast('вқҢ дҝқеӯҳеӨұиҙҘпјҢиҜ·йҮҚиҜ•');
    console.error('saveVisit error:', err);
  }
}

let pvS={pid:null,catId:null,vi:null,phid:null,tool:'circle',color:'#FF3B30',ann:[],drawing:false,sx:0,sy:0,baseImg:null,cx:0,cy:0};

function pvOpen(pid,catId,vi,phid){
  const p=(data[catId]||[]).find(x=>x.id===pid);
  const v=p.visits[vi];
  const ph=(v.photos||[]).find(x=>x.id===phid);
  if(!ph)return;
  pvS={...pvS,pid,catId,vi:parseInt(vi),phid,ann:[],drawing:false};
  document.getElementById('pv-ttl').textContent=`${p.name} В· ${v.date} В· ${ph.lbl}`;
  const canvas=document.getElementById('pvc');
  const ctx=canvas.getContext('2d');
  const img=new Image();
  img.onerror=()=>{
    // Draw error message on canvas
    canvas.width=300; canvas.height=200;
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(0,0,300,200);
    ctx.fillStyle='#ff6b6b';
    ctx.font='bold 16px PingFang SC,Arial';
    ctx.textAlign='center';
    ctx.fillText('з…§зүҮеҠ иҪҪеӨұиҙҘ',150,90);
    ctx.fillStyle='#aaa';
    ctx.font='12px PingFang SC,Arial';
    ctx.fillText('еӣҫзүҮеҸҜиғҪиҝҮеӨ§жҲ–е·ІжҚҹеқҸ',150,120);
    ctx.textAlign='left';
    showToast('вҡ пёҸ з…§зүҮеҠ иҪҪеӨұиҙҘпјҢеӣҫзүҮеҸҜиғҪиҝҮеӨ§');
  };
  img.onload=()=>{
    const mw=Math.min(window.innerWidth-24,700);
    const mh=Math.min(window.innerHeight*0.6,580);
    const sc=Math.min(mw/img.width,mh/img.height,1);
    canvas.width=img.width*sc; canvas.height=img.height*sc;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    pvS.baseImg=canvas.toDataURL();
  };
  img.src=ph.annotated||ph.src;
  document.getElementById('pv').style.display='flex';
  canvas.onmousedown=e=>pvDown(e,canvas.getBoundingClientRect());
  canvas.onmousemove=e=>pvMove(e,canvas.getBoundingClientRect());
  canvas.onmouseup=e=>pvUp(e,canvas.getBoundingClientRect());
  canvas.ontouchstart=e=>{e.preventDefault();pvDown(e.touches[0],canvas.getBoundingClientRect());};
  canvas.ontouchmove=e=>{e.preventDefault();pvMove(e.touches[0],canvas.getBoundingClientRect());};
  canvas.ontouchend=e=>{e.preventDefault();pvUp(e.changedTouches[0],canvas.getBoundingClientRect());};
}

function pvDown(e,r){
  pvS.drawing=true; pvS.sx=e.clientX-r.left; pvS.sy=e.clientY-r.top;
  if(pvS.tool==='text'){
    const t=prompt('иҫ“е…Ҙж ҮжіЁж–Үеӯ—пјҡ');
    if(t){ pvS.ann.push({type:'text',x:pvS.sx,y:pvS.sy,text:t,color:pvS.color}); pvRedraw(); }
    pvS.drawing=false;
  }
}
function pvMove(e,r){
  if(!pvS.drawing||pvS.tool==='text')return;
  pvS.cx=e.clientX-r.left; pvS.cy=e.clientY-r.top; pvRedraw(true);
}
function pvUp(e,r){
  if(!pvS.drawing||pvS.tool==='text')return;
  pvS.drawing=false;
  pvS.ann.push({type:pvS.tool,x1:pvS.sx,y1:pvS.sy,x2:e.clientX-r.left,y2:e.clientY-r.top,color:pvS.color});
  pvRedraw();
}
function pvRedraw(preview){
  const canvas=document.getElementById('pvc'),ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    ctx.drawImage(img,0,0);
    pvS.ann.forEach(a=>drawAnn(ctx,a));
    if(preview&&pvS.drawing) drawAnn(ctx,{type:pvS.tool,x1:pvS.sx,y1:pvS.sy,x2:pvS.cx,y2:pvS.cy,color:pvS.color});
  };
  img.src=pvS.baseImg;
}
function drawAnn(ctx,a){
  ctx.strokeStyle=a.color;ctx.fillStyle=a.color;ctx.lineWidth=3;
  if(a.type==='circle'){
    const rx=Math.abs(a.x2-a.x1)/2,ry=Math.abs(a.y2-a.y1)/2;
    ctx.beginPath();ctx.ellipse((a.x1+a.x2)/2,(a.y1+a.y2)/2,Math.max(rx,2),Math.max(ry,2),0,0,Math.PI*2);ctx.stroke();
  } else if(a.type==='arrow'){
    const dx=a.x2-a.x1,dy=a.y2-a.y1,len=Math.sqrt(dx*dx+dy*dy);if(len<4)return;
    ctx.beginPath();ctx.moveTo(a.x1,a.y1);ctx.lineTo(a.x2,a.y2);ctx.stroke();
    const ang=Math.atan2(dy,dx),hw=14;
    ctx.beginPath();ctx.moveTo(a.x2,a.y2);
    ctx.lineTo(a.x2-hw*Math.cos(ang-.4),a.y2-hw*Math.sin(ang-.4));
    ctx.lineTo(a.x2-hw*Math.cos(ang+.4),a.y2-hw*Math.sin(ang+.4));
    ctx.closePath();ctx.fill();
  } else if(a.type==='text'){
    ctx.font='bold 18px PingFang SC,Arial';
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillText(a.text,a.x+1,a.y+1);
    ctx.fillStyle=a.color;ctx.fillText(a.text,a.x,a.y);
  }
}
function setTool(t){
  pvS.tool=t;
  ['circle','arrow','text'].forEach(x=>{ const el=document.getElementById('tl-'+x); if(el) el.classList.toggle('active',x===t); });
}
function setColor(el){ pvS.color=el.dataset.c; document.querySelectorAll('.cdot').forEach(d=>d.classList.toggle('active',d===el)); }
function clearAnn(){ pvS.ann=[]; pvRedraw(); }
function undoLast(){ if(pvS.ann.length){ pvS.ann.pop(); pvRedraw(); } }
function closePV(){ document.getElementById('pv').style.display='none'; }
function savePV(){
  const canvas=document.getElementById('pvc');
  const imgData=canvas.toDataURL('image/jpeg',0.9);
  const p=(data[pvS.catId]||[]).find(x=>x.id===pvS.pid);
  const v=p.visits[pvS.vi];
  const ph=(v.photos||[]).find(x=>x.id===pvS.phid);
  if(ph){ ph.annotated=imgData; saveData(); }
  closePV(); renderContent();
}

  h3{font-size:11pt;color:#1A5276;margin:16px 0 6px;border-left:4px solid #1A5276;padding-left:8px;background:#f0f4f8;padding:6px 8px;border-radius:0 6px 6px 0}
  .subtitle{color:#7F8C8D;font-size:10pt;margin-bottom:20px}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid #CADCEC;border-radius:8px;overflow:hidden;margin-bottom:20px}
  .meta-cell{padding:8px 12px;border-right:1px solid #CADCEC;border-bottom:1px solid #CADCEC}

  .meta-val{font-size:10.5pt;font-weight:700}
  .visit-box{border:1px solid #CADCEC;border-radius:8px;margin-bottom:20px;overflow:hidden;page-break-inside:avoid}

  .visit-head-date{font-size:11pt;font-weight:700}
  .visit-head-score{font-size:9pt;padding:3px 10px;border-radius:12px;font-weight:700}
  .visit-body{padding:14px}
  .data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:12px}
  .data-cell .lbl{font-size:9pt;color:#7F8C8D;display:block}
  .data-cell .val{font-size:10pt;font-weight:500;border-bottom:1px solid #eee;padding-bottom:2px}
  .spec-box{background:#f0faf7;border:1px solid #a9dfbf;border-radius:6px;padding:10px 12px;margin-bottom:12px}
  .spec-title{font-size:9pt;font-weight:800;color:#0E6655;margin-bottom:6px}
  .photo-section{margin-top:12px}
  .photo-section-title{font-size:9pt;color:#7F8C8D;margin-bottom:6px;font-weight:700}
  .photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .photo-item{text-align:center}
  .photo-item img{width:100%;border-radius:6px;border:1px solid #CADCEC;display:block}
  .photo-item .photo-lbl{font-size:8pt;color:#7F8C8D;margin-top:3px}
  .footer{margin-top:32px;padding-top:12px;border-top:1px solid #CADCEC;font-size:8pt;color:#aaa;display:flex;justify-content:space-between}
  .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:9pt;font-weight:700}
  .divider{border:none;border-top:1px solid #CADCEC;margin:12px 0}

</style>
</head><body>`;

  // в”Җв”Җ Cover / Header в”Җв”Җ
  html += `<h1>${title}</h1>
  <div class="subtitle">${subtitle} &nbsp;В·&nbsp; ${isZh?'еҜјеҮәж—¶й—ҙ':'Exported'}: ${nowDate()} ${nowTime()}</div>`;

  // в”Җв”Җ Patient Info в”Җв”Җ
  const days = daysSince(p.surgeryDate);
  const infoItems = isZh ? [
    ['е§“еҗҚ', p.name], ['зј–еҸ·', p.id], ['жҖ§еҲ«/е№ҙйҫ„', `${p.gender} / ${p.age}еІҒ`],
    ['жүӢжңҜзұ»еһӢ', catName], ['жүӢжңҜж—Ҙжңҹ', p.surgeryDate], [`жңҜеҗҺеӨ©ж•°`, `${days} еӨ©`],
    ['з—…еҢә', p.ward||'вҖ”'], ['иҒ”зі»з”өиҜқ', p.phone||'вҖ”'], ['йҡҸи®ҝж¬Ўж•°', `${p.visits.length} ж¬Ў`],
  ] : [
    ['Name', p.name], ['ID', p.id], ['Sex / Age', `${p.gender==='з”·'?'Male':'Female'} / ${p.age}y`],
    ['Surgery Type', catName], ['Surgery Date', p.surgeryDate], ['Post-op Days', `${days} days`],
    ['Ward', p.ward||'вҖ”'], ['Contact', p.phone||'вҖ”'], ['Follow-up Count', `${p.visits.length}`],
  ];

  html += `<div class="meta-grid">`;
  infoItems.forEach(([k,v])=>{
    html += `<div class="meta-cell"><span class="meta-lbl">${k}</span><span class="meta-val">${v}</span></div>`;
  });
  html += `</div>`;

  // в”Җв”Җ Visit Records в”Җв”Җ
  const visitTitle = isZh ? 'йҡҸи®ҝи®°еҪ•' : 'Follow-up Records';
  html += `<h3>${isZh?'рҹ“Ӣ':'рҹ“Ӣ'} ${visitTitle}</h3>`;

  if(!p.visits.length){
    html += `<p style="color:#aaa;font-style:italic">${isZh?'жҡӮж— йҡҸи®ҝи®°еҪ•':'No follow-up records yet'}</p>`;
  }

  p.visits.forEach((v,idx)=>{
    const sc = si(v.hs);
    const scoreLabel = isZh ? sc.l : SCORE_LABELS_EN[v.hs]||sc.l;
    const scoreColor = sc.c;
    const visitNum = isZh ? `з¬¬ ${idx+1} ж¬ЎйҡҸи®ҝ` : `Visit ${idx+1}`;

    html += `<div class="visit-box">
      <div class="visit-head">
        <span class="visit-head-date">рҹ“… ${visitNum} &nbsp; ${v.date} &nbsp; ${v.time}</span>
        <span class="visit-head-score badge" style="background:${scoreColor}33;color:${scoreColor};border:1px solid ${scoreColor}66">${scoreLabel}</span>
      </div>
      <div class="visit-body">`;

    // Basic data
    const woundLabel = isZh ? 'дјӨеҸЈе°әеҜё' : 'Wound Size';
    const dressingLabel = isZh ? 'жҚўиҚҜи®°еҪ•' : 'Dressing';
    const medLabel = isZh ? 'з”ЁиҚҜи®°еҪ•' : 'Medication';
    const funcLabel = isZh ? 'еҠҹиғҪжҒўеӨҚ' : 'Functional Recovery';
    const areaLabel = isZh ? 'дјӨеҸЈйқўз§Ҝ' : 'Wound Area';
    const symLabel = isZh ? 'жӮЈиҖ…дё»иҜү' : 'Chief Complaint';
    const notesLabel = isZh ? 'еҢ»з”ҹеӨҮжіЁ' : 'Clinical Notes';

    html += `<div class="data-grid">
      <div class="data-cell"><span class="lbl">${woundLabel}</span><span class="val">${v.wl} Г— ${v.ww} cm</span></div>
      <div class="data-cell"><span class="lbl">${areaLabel}</span><span class="val">${(v.wl*v.ww).toFixed(2)} cmВІ</span></div>
      <div class="data-cell"><span class="lbl">${dressingLabel}</span><span class="val">${v.dress||'вҖ”'}</span></div>
      <div class="data-cell"><span class="lbl">${medLabel}</span><span class="val">${v.med||'вҖ”'}</span></div>
    </div>`;

    if(v.sym||v.func){
      html += `<div class="data-grid">
        ${v.sym?`<div class="data-cell"><span class="lbl">${symLabel}</span><span class="val">${v.sym}</span></div>`:''}
        ${v.func?`<div class="data-cell"><span class="lbl">${funcLabel}</span><span class="val">${v.func}</span></div>`:''}
      </div>`;
    }

    // Specialty fields
    if(v.sf && c.fields && c.fields.length){
      const hasAny = c.fields.some(f=>v.sf[f.id]);
      if(hasAny){
        const specTitle = isZh ? `дё“з§‘иҜ„дј° вҖ” ${catName}` : `Specialty Assessment вҖ” ${catName}`;
        html += `<div class="spec-box"><div class="spec-title">рҹ”¬ ${specTitle}</div>
        <div class="data-grid">`;
        c.fields.forEach(f=>{
          const val = v.sf[f.id];
          if(!val) return;
          const lbl = L[f.id] || f.lbl;
          html += `<div class="data-cell"><span class="lbl">${lbl}</span><span class="val">${val}</span></div>`;
        });
        html += `</div></div>`;
      }
    }

    // Notes
    if(v.notes){
      html += `<hr class="divider"><div class="data-cell"><span class="lbl">${notesLabel}</span><span class="val">${v.notes}</span></div>`;
    }

    // Photos
    const photos = v.photos||[];
    if(photos.length){
      const photoTitle = isZh ? `йҡҸи®ҝз…§зүҮпјҲ${photos.length}еј пјү` : `Follow-up Photos (${photos.length})`;
      html += `<div class="photo-section">
        <div class="photo-section-title">рҹ“· ${photoTitle}</div>
        <div class="photo-grid">`;
      photos.forEach(ph=>{
        const src = ph.annotated||ph.src;
        if(src){
          html += `<div class="photo-item">
            <img src="${src}" alt="${ph.lbl}"/>
            <div class="photo-lbl">${ph.lbl} В· ${ph.ts||v.date}</div>
          </div>`;
        }
      });
      html += `</div></div>`;
    }

    html += `</div></div>`;
  });

  // в”Җв”Җ Footer в”Җв”Җ
  const footerL = isZh
    ? `йӘЁз§‘жүӢи¶іжҳҫеҫ®еӨ–з§‘йҡҸи®ҝзі»з»ҹ В· иҮӘеҠЁз”ҹжҲҗ`
    : `Orthopaedic Hand & Microsurgery Follow-up System В· Auto-generated`;
  const footerR = isZh
    ? `жң¬жҠҘе‘Ҡд»…дҫӣеҢ»еӯҰеҸӮиҖғпјҢдёҚдҪңдёәжі•еҫӢдҫқжҚ®`
    : `For medical reference only. Not a legal document.`;
  html += `<div class="footer"><span>${footerL}</span><span>${footerR}</span></div>`;
  html += `</body></html>`;

  const fname = isZh
    ? `йҡҸи®ҝжҠҘе‘Ҡ_${p.name}_${nowDate()}.html`
    : `FollowUp_Report_${p.name}_${nowDate()}.html`;
  dl(new Blob([html],{type:'text/html;charset=utf-8;'}), fname);
  showToast(isZh ? `вң… ${p.name} дёӯж–ҮжҠҘе‘Ҡе·ІеҜјеҮә` : `вң… ${p.name} English report exported`);
}
